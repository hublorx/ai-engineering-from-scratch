<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <style>
      .box { fill: #faf6ef; stroke: #1a1a1a; stroke-width: 1.5; }
      .hot { fill: #fff1d6; stroke: #c0392b; stroke-width: 1.5; }
      .label { font-size: 12px; font-weight: 700; fill: #1a1a1a; }
      .content { font-size: 11px; fill: #333; font-family: 'Menlo', monospace; }
      .caption { font-size: 10px; fill: #555; font-style: italic; }
      .title { font-size: 15px; font-weight: 700; fill: #1a1a1a; }
      .tag { font-size: 10px; fill: #c0392b; font-weight: 600; }
      .bar { fill: #c0392b; opacity: 0.6; }
      .line { stroke: #1a1a1a; stroke-width: 1.3; fill: none; }
    </style>
  </defs>

  <text x="440" y="26" text-anchor="middle" class="title">voice-agent pipeline — stream everything, budget every link</text>

  <rect x="20" y="55" width="110" height="90" class="box"/>
  <text x="75" y="78" text-anchor="middle" class="label">mic → WebRTC</text>
  <text x="75" y="96" text-anchor="middle" class="content">10 ms frames</text>
  <text x="75" y="115" text-anchor="middle" class="content">20-40 ms</text>
  <text x="75" y="134" text-anchor="middle" class="caption">jitter buffer</text>

  <line x1="132" y1="100" x2="153" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="155" y="55" width="110" height="90" class="hot"/>
  <text x="210" y="78" text-anchor="middle" class="label">VAD</text>
  <text x="210" y="96" text-anchor="middle" class="content">Silero</text>
  <text x="210" y="115" text-anchor="middle" class="content">30-80 ms</text>
  <text x="210" y="134" text-anchor="middle" class="caption">87.7% TPR @ 5%</text>

  <line x1="267" y1="100" x2="288" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="290" y="55" width="110" height="90" class="box"/>
  <text x="345" y="78" text-anchor="middle" class="label">STT stream</text>
  <text x="345" y="96" text-anchor="middle" class="content">Parakeet / Kyutai</text>
  <text x="345" y="115" text-anchor="middle" class="content">100-300 ms</text>
  <text x="345" y="134" text-anchor="middle" class="caption">flush trick → 125 ms</text>

  <line x1="402" y1="100" x2="423" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="425" y="55" width="110" height="90" class="box"/>
  <text x="480" y="78" text-anchor="middle" class="label">LLM stream</text>
  <text x="480" y="96" text-anchor="middle" class="content">GPT-4o / Gemini</text>
  <text x="480" y="115" text-anchor="middle" class="content">100-500 ms</text>
  <text x="480" y="134" text-anchor="middle" class="caption">pin first 20 tokens</text>

  <line x1="537" y1="100" x2="558" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="560" y="55" width="110" height="90" class="hot"/>
  <text x="615" y="78" text-anchor="middle" class="label">TTS stream</text>
  <text x="615" y="96" text-anchor="middle" class="content">Kokoro / Orpheus</text>
  <text x="615" y="115" text-anchor="middle" class="content">100-300 ms TTFA</text>
  <text x="615" y="134" text-anchor="middle" class="caption">opus-encode on fly</text>

  <line x1="672" y1="100" x2="693" y2="100" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="695" y="55" width="160" height="90" class="box"/>
  <text x="775" y="78" text-anchor="middle" class="label">WebRTC → speaker</text>
  <text x="775" y="96" text-anchor="middle" class="content">opus codec</text>
  <text x="775" y="115" text-anchor="middle" class="content">50-100 ms</text>
  <text x="775" y="134" text-anchor="middle" class="caption">PLC concealment</text>

  <rect x="20" y="175" width="835" height="90" class="box"/>
  <text x="437" y="196" text-anchor="middle" class="label">2026 end-to-end latency (p50)</text>
  <rect x="80" y="212" width="120" height="20" class="bar"/>   <text x="210" y="228" class="content">Moshi (full-duplex)        200 ms</text>
  <rect x="80" y="235" width="180" height="20" class="bar"/>   <text x="270" y="251" class="content">Moshi practical on L4      ~300 ms</text>

  <rect x="20" y="275" width="835" height="195" class="hot"/>
  <text x="437" y="296" text-anchor="middle" class="label">2026 stack picks by budget</text>
  <text x="50" y="322" class="content">&lt; 200 ms   full-duplex architecture (Moshi / Sesame CSM) — see lesson 15</text>
  <text x="50" y="342" class="content">&lt; 500 ms   LiveKit + Silero VAD + Deepgram Nova-3 + GPT-4o + Cartesia Sonic</text>
  <text x="50" y="362" class="content">&lt; 800 ms   Pipecat + Silero + Whisper-streaming + Claude 3.5 + Kokoro-82M</text>
  <text x="50" y="382" class="content">on-device  silero-vad + whisper.cpp ggml-tiny + Kokoro-82M ONNX + native audio</text>
  <text x="50" y="412" class="caption">key 2026 tricks: Unmute flush trick (4× realtime STT) · stream TTS from 20-token LLM prefix</text>
  <text x="50" y="432" class="caption">never batch an entire utterance before STT; never wait for EOS before TTS</text>
  <text x="50" y="452" class="caption">always test on real network jitter — localhost latency lies</text>
</svg>
